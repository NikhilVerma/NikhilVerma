name: Latest blog posts

on:
  schedule:
    # Once a day at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://nikhil-verma.com/rss.xml"
          max_post_count: 5
          date_format: "mmm d, yyyy"
          template: "- [$title]($url) — $date$newline"
